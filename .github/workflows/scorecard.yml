# openssf scorecard: weekly supply-chain posture scan, published to
# api.scorecard.dev (powers the readme badge) + sarif into the security tab.
#
# publish_results forbids top-level env, workflow-level write permissions,
# and unapproved actions in this job — keep it minimal.
name: Scorecard

on:
  branch_protection_rule:
  schedule:
    - cron: "30 6 * * 1" # weekly, monday 06:30 utc (after codeql)
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      security-events: write # upload sarif
      id-token: write # publish results (oidc)
      contents: read
      actions: read
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload SARIF to code scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
