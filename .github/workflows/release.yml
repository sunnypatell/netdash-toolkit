# release: tag push -> validate -> 3-os electron build -> slsa build l3
# provenance -> single-publish release (notes + checksums + verification
# footer) -> homebrew cask bump.
#
# supply-chain design:
# - every job starts with harden-runner (egress audit; block is linux-only
#   and electron-builder's endpoint set churns, so audit = zero maintenance).
# - build legs are hermetic: no actions/cache of any kind. pnpm installs are
#   integrity-checked against the lockfile; electron binaries are fetched
#   fresh and checksum-verified by @electron/get. ci builds cache freely;
#   release builds do not.
# - slsa build l3 comes from the slsa-github-generator reusable workflow
#   (build + signing isolated from this workflow). github native attestations
#   (build l2) are published too for the `gh attestation verify` ux.
# - the release is created as a draft and published exactly once with all
#   assets + notes attached, which keeps this pipeline compatible with
#   github immutable releases if enabled in repo settings.
name: Release

on:
  push:
    tags:
      - "v*"

permissions: {}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  validate:
    name: Validate tag + quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Validate tag format
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "::error::invalid tag '$TAG' (expected vX.Y.Z or vX.Y.Z-prerelease)"
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup
        with:
          cache: "false"

      - name: Check formatting
        run: pnpm format:check

      - name: Run ESLint
        run: pnpm lint

      - name: Typecheck (app)
        run: pnpm typecheck

      - name: Typecheck (electron main/preload)
        run: pnpm electron:compile

      # artifact filenames embed package.json's version while notes/cask
      # urls derive from the tag — a mismatch would publish a release whose
      # verification commands reference files that don't exist.
      - name: Verify tag matches package.json version
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./package.json').version")
          if [ "${TAG#v}" != "$pkg_version" ]; then
            echo "::error::tag $TAG does not match package.json version $pkg_version — bump package.json before tagging"
            exit 1
          fi

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    needs: validate
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: pnpm dist:linux
            expected_assets: 2 # AppImage, deb
          - os: macos-latest
            build_cmd: pnpm dist:mac
            expected_assets: 4 # dmg x2, zip x2
          - os: windows-latest
            build_cmd: pnpm dist:win
            expected_assets: 2 # nsis setup exe, portable exe
    outputs:
      hash-ubuntu-latest: ${{ steps.hash.outputs.hash-ubuntu-latest }}
      hash-macos-latest: ${{ steps.hash.outputs.hash-macos-latest }}
      hash-windows-latest: ${{ steps.hash.outputs.hash-windows-latest }}
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # hermetic: no pnpm store cache on release builds (see header).
      - name: Setup toolchain
        uses: ./.github/actions/setup
        with:
          cache: "false"

      # no signing identity exists on hosted runners, so electron-builder
      # ad-hoc signs on macos. that keeps the bundle seal valid (apple
      # silicon refuses to launch apps without one); the verify step below
      # fails the release if the seal is ever broken.
      - name: Build Electron app
        run: ${{ matrix.build_cmd }}

      - name: Verify macOS ad-hoc code signature
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          found=0
          for app in release/mac*/*.app; do
            found=1
            echo "verifying seal: $app"
            codesign --verify --deep --strict --verbose=2 "$app"
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::no .app bundles found to verify"
            exit 1
          fi

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist-assets
          find release -maxdepth 1 -type f \
            \( -name '*.dmg' -o -name '*.zip' -o -name '*.exe' -o -name '*.AppImage' -o -name '*.deb' \) \
            -exec cp {} dist-assets/ \;
          ls -la dist-assets

      - name: Sanity-check staged assets
        shell: bash
        env:
          EXPECTED: ${{ matrix.expected_assets }}
        run: |
          set -euo pipefail
          count=$(find dist-assets -type f | wc -l | tr -d ' ')
          if [ "$count" -ne "$EXPECTED" ]; then
            echo "::error::expected $EXPECTED assets, found $count"
            exit 1
          fi
          # corrupt/truncated build gate: a real electron bundle is >40mb
          min_bytes=41943040
          while IFS= read -r f; do
            size=$(wc -c < "$f" | tr -d ' ')
            if [ "$size" -lt "$min_bytes" ]; then
              echo "::error::$f is suspiciously small ($size bytes)"
              exit 1
            fi
          done < <(find dist-assets -type f)

      - name: Compute asset digests (slsa subjects)
        id: hash
        shell: bash
        run: |
          set -euo pipefail
          cd dist-assets
          if command -v sha256sum >/dev/null 2>&1; then
            checksums=$(sha256sum -- *)
          else
            checksums=$(shasum -a 256 -- *)
          fi
          echo "$checksums"
          # bsd base64 (macos) has no -w flag; tr keeps it portable
          encoded=$(echo "$checksums" | base64 | tr -d '\n')
          echo "hash-${{ matrix.os }}=$encoded" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binaries-${{ matrix.os }}
          path: dist-assets/*
          if-no-files-found: error
          retention-days: 7
          # artifacts are immutable per run; without this, "re-run all jobs"
          # dies at upload
          overwrite: true

  combine-hashes:
    name: Combine SLSA subjects
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: build
    outputs:
      hashes: ${{ steps.combine.outputs.hashes }}
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Merge per-OS digest lists
        id: combine
        env:
          BUILD_OUTPUTS: ${{ toJSON(needs.build.outputs) }}
        run: |
          set -euo pipefail
          echo "$BUILD_OUTPUTS" \
            | jq -r 'to_entries[] | select(.key | startswith("hash-")) | .value' \
            | while read -r b64; do echo "$b64" | base64 -d; done > subjects.txt
          cat subjects.txt
          count=$(wc -l < subjects.txt | tr -d ' ')
          if [ "$count" -ne 8 ]; then
            echo "::error::expected 8 release subjects, got $count"
            exit 1
          fi
          echo "hashes=$(base64 -w0 < subjects.txt)" >> "$GITHUB_OUTPUT"

  # slsa build l3: build definition + signing happen inside the slsa-framework
  # trusted reusable workflow, isolated from this repo's workflow. produces
  # netdash-toolkit-<tag>.intoto.jsonl, verifiable offline with slsa-verifier.
  provenance:
    name: Generate SLSA provenance
    needs: combine-hashes
    permissions:
      actions: read # read the workflow path
      id-token: write # sign the provenance
      # the generator's (skipped) upload-assets job statically declares
      # contents: write; reusable-workflow permission validation happens
      # before if: conditions evaluate, so the caller must grant it.
      contents: write
    # the generator MUST be referenced by a full semver tag (not a sha): the
    # build fails otherwise, because slsa-verifier validates the trusted
    # builder's ref against official release tags.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: ${{ needs.combine-hashes.outputs.hashes }}
      provenance-name: netdash-toolkit-${{ github.ref_name }}.intoto.jsonl
      upload-assets: false # the publish job attaches it to the draft release

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [build, provenance]
    permissions:
      contents: write # create the release + upload assets
      id-token: write # sign native attestations
      attestations: write # store native attestations
    outputs:
      dmg_arm64_sha: ${{ steps.dmg.outputs.arm64 }}
      dmg_x64_sha: ${{ steps.dmg.outputs.x64 }}
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # sbom from the lockfile only (exact, reproducible dependency graph;
      # no node_modules install needed in this job). the action does not
      # create the output dir itself.
      - name: Prepare SBOM output directory
        run: mkdir -p sbom

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          file: pnpm-lock.yaml
          format: cyclonedx-json
          output-file: sbom/netdash-toolkit-${{ github.ref_name }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true

      - name: Download SLSA provenance
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.provenance.outputs.provenance-name }}
          path: dist

      - name: Assemble assets + checksums
        run: |
          set -euo pipefail
          mv sbom/*.cdx.json dist/
          cd dist
          sha256sum -- * > checksums.tmp
          mv checksums.tmp checksums.txt
          echo "release assets:"
          ls -la
          cat checksums.txt

      # github native attestations (slsa build l2 here; l3 is covered by the
      # generator above). gives users `gh attestation verify` + the repo's
      # /attestations page.
      - name: Attest build provenance (GitHub native)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb

      - name: Extract macOS DMG digests for homebrew
        id: dmg
        run: |
          set -euo pipefail
          arm64=$(awk '/-mac-arm64\.dmg$/ {print $1}' dist/checksums.txt)
          x64=$(awk '/-mac-x64\.dmg$/ {print $1}' dist/checksums.txt)
          if ! [[ "$arm64" =~ ^[a-f0-9]{64}$ && "$x64" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::could not extract dmg digests from checksums.txt"
            exit 1
          fi
          echo "arm64=$arm64" >> "$GITHUB_OUTPUT"
          echo "x64=$x64" >> "$GITHUB_OUTPUT"

      - name: Compose release notes (generated notes + verification footer)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          # categorized notes from merged prs (respects .github/release.yml)
          gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$TAG" --jq .body > notes.md

          cat >> notes.md <<'EOF'

          ---

          <!-- release-verification -->
          ## 📦 checksums (sha-256)

          ```
          @CHECKSUMS@
          ```

          verify any download: `sha256sum -c checksums.txt --ignore-missing` (macos: `shasum -a 256 -c checksums.txt --ignore-missing`)

          ## 🔏 provenance — proof these binaries came from this repo's ci

          every asset above was built from `@TAG@` on github-hosted runners, with [slsa build level 3](https://slsa.dev/spec/v1.0/levels) provenance (`netdash-toolkit-@TAG@.intoto.jsonl`) and [github artifact attestations](https://github.com/@REPO@/attestations).

          verify with [slsa-verifier](https://github.com/slsa-framework/slsa-verifier) — works offline, no github account needed:

          ```
          slsa-verifier verify-artifact NetDash-Toolkit-@VERSION@-mac-arm64.dmg \
            --provenance-path netdash-toolkit-@TAG@.intoto.jsonl \
            --source-uri github.com/@REPO@ \
            --source-tag @TAG@
          ```

          or with the github cli:

          ```
          gh attestation verify NetDash-Toolkit-@VERSION@-mac-arm64.dmg --repo @REPO@
          ```

          dependency sbom: `netdash-toolkit-@TAG@-sbom.cdx.json` (cyclonedx)

          ## 💻 install notes

          **macos — homebrew (recommended):**

          ```
          brew tap sunnypatell/netdash https://github.com/sunnypatell/netdash-toolkit
          brew install --cask --no-quarantine netdash
          ```

          **macos — direct download:** the app is ad-hoc signed (notarization requires a paid apple developer id), so gatekeeper calls it "damaged" on first launch. clear the quarantine flag after copying to /applications:

          ```
          xattr -cr "/Applications/NetDash Toolkit.app"
          ```

          **windows:** binaries are unsigned; smartscreen warns on first run. verify the checksum/provenance above, then "more info" → "run anyway".

          **linux:** `chmod +x NetDash-Toolkit-@VERSION@-linux-x86_64.AppImage`, or `sudo dpkg -i NetDash-Toolkit-@VERSION@-linux-amd64.deb`
          <!-- /release-verification -->
          EOF

          python3 - "$TAG" "$VERSION" <<'PY'
          import pathlib, sys
          tag, version = sys.argv[1], sys.argv[2]
          notes = pathlib.Path("notes.md").read_text()
          checksums = pathlib.Path("dist/checksums.txt").read_text().rstrip()
          notes = (
              notes.replace("@CHECKSUMS@", checksums)
              .replace("@VERSION@", version)
              .replace("@TAG@", tag)
              .replace("@REPO@", "sunnypatell/netdash-toolkit")
          )
          pathlib.Path("notes.md").write_text(notes)
          PY

          echo "----- composed notes -----"
          cat notes.md

      - name: Create draft release, upload assets, publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          create_args=(--draft --verify-tag --title "$TAG" --notes-file notes.md)
          publish_args=(--draft=false)
          if [[ "$TAG" == *-* ]]; then
            create_args+=(--prerelease)
          else
            publish_args+=(--latest)
          fi

          if gh release view "$TAG" --json isDraft >/dev/null 2>&1; then
            echo "release for $TAG already exists (re-run); refreshing notes"
            gh release edit "$TAG" --notes-file notes.md
          else
            gh release create "$TAG" "${create_args[@]}"
          fi

          gh release upload "$TAG" dist/* --clobber
          gh release edit "$TAG" "${publish_args[@]}"

          {
            echo "## release $TAG published"
            echo ""
            echo '```'
            cat dist/checksums.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  homebrew:
    name: Update Homebrew cask
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: publish
    # casks track stable releases only
    if: ${{ !contains(github.ref_name, '-') }}
    permissions:
      contents: write
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Re-validate tag format (defense in depth — this job pushes to main)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::refusing to update cask for non-stable tag '$TAG'"
            exit 1
          fi

      # this checkout intentionally keeps credentials: the job's entire
      # purpose is committing the cask bump back to main.
      - name: Checkout main
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 # zizmor: ignore[artipacked]
        with:
          ref: main

      - name: Verify release assets are live
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          base="https://github.com/sunnypatell/netdash-toolkit/releases/download/${TAG}"
          for asset in "NetDash-Toolkit-${VERSION}-mac-arm64.dmg" "NetDash-Toolkit-${VERSION}-mac-x64.dmg"; do
            echo "checking ${base}/${asset}"
            curl -fsIL --retry 5 --retry-delay 5 --retry-all-errors -o /dev/null "${base}/${asset}"
          done

      - name: Regenerate cask
        env:
          TAG: ${{ github.ref_name }}
          ARM64_SHA: ${{ needs.publish.outputs.dmg_arm64_sha }}
          X64_SHA: ${{ needs.publish.outputs.dmg_x64_sha }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          if ! [[ "$ARM64_SHA" =~ ^[a-f0-9]{64}$ && "$X64_SHA" =~ ^[a-f0-9]{64}$ ]]; then
            echo "::error::missing or malformed dmg digests from publish job"
            exit 1
          fi

          cat > Casks/netdash.rb <<EOF
          cask "netdash" do
            version "${VERSION}"

            on_arm do
              sha256 "${ARM64_SHA}"
              url "https://github.com/sunnypatell/netdash-toolkit/releases/download/v#{version}/NetDash-Toolkit-#{version}-mac-arm64.dmg"
            end

            on_intel do
              sha256 "${X64_SHA}"
              url "https://github.com/sunnypatell/netdash-toolkit/releases/download/v#{version}/NetDash-Toolkit-#{version}-mac-x64.dmg"
            end

            name "NetDash Toolkit"
            desc "Professional network engineering toolkit with 40+ networking tools"
            homepage "https://github.com/sunnypatell/netdash-toolkit"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "NetDash Toolkit.app"

            caveats <<~CAVEATS
              this app is ad-hoc signed (not notarized). install with
              --no-quarantine, or clear the quarantine flag after install:
                xattr -cr "/Applications/NetDash Toolkit.app"
            CAVEATS

            zap trash: [
              "~/Library/Application Support/netdash-toolkit",
              "~/Library/Preferences/com.sunnypatell.netdash-toolkit.plist",
              "~/Library/Saved Application State/com.sunnypatell.netdash-toolkit.savedState",
            ]
          end
          EOF

          ruby -c Casks/netdash.rb
          echo "updated Casks/netdash.rb:"
          cat Casks/netdash.rb

      - name: Commit and push cask update
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add Casks/netdash.rb
          if git diff --staged --quiet; then
            echo "cask already up to date"
            exit 0
          fi

          git commit -m "chore(homebrew): auto-update cask to v${VERSION}

          - updated version to ${VERSION}
          - updated sha256 hashes for arm64 and x64 dmgs

          [skip ci]"

          git push origin main
