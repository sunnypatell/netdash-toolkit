# ci: quality gates + web build + electron packaging smoke test.
#
# design notes:
# - one consolidated quality job instead of 3 separate jobs (format/lint/
#   typecheck used to each pay a full checkout+install; same coverage, third
#   of the wall clock).
# - electron packaging (--dir) runs on every push/PR; previously electron
#   packaging was only ever exercised at release time, which is the worst
#   possible moment to find out it broke.
# - caching: pnpm store (integrity-checked by the lockfile), .next/cache,
#   and the electron + electron-builder binary caches. release builds in
#   release.yml deliberately do NOT use these caches (hermetic builds).
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (format, lint, types)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Check formatting
        run: pnpm format:check

      - name: Run ESLint
        run: pnpm lint

      - name: Typecheck (app)
        run: pnpm typecheck

      - name: Typecheck (electron main/preload)
        run: pnpm electron:compile

  build:
    name: Build (web + electron pack)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Harden runner (egress audit)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup toolchain
        uses: ./.github/actions/setup

      - name: Restore Next.js build cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('app/**', 'components/**', 'contexts/**', 'hooks/**', 'lib/**', 'styles/**', 'types/**', 'next.config.mjs') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Restore Electron binary caches
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Build web application
        run: pnpm build

      - name: Pack Electron app (smoke test)
        run: pnpm electron:compile && pnpm exec electron-builder --linux --dir

      - name: Assert packaged app launchable artifacts exist
        run: |
          test -x "release/linux-unpacked/netdash-toolkit" || { echo "::error::packed electron binary missing"; exit 1; }
          test -f "release/linux-unpacked/resources/app.asar" || { echo "::error::app.asar missing from package"; exit 1; }
