# deliberately low-noise: monthly cadence, everything grouped into ONE pr
# per ecosystem, max 2 open prs total. worst case = 2 prs/month, no
# per-dependency spam. security advisories still surface immediately via
# github's own alerts regardless of this schedule.
#
# this also keeps the sha-pinned actions in .github/workflows fresh —
# without it, pins rot silently.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    # 7-day cooldown: a compromised action release gets caught upstream
    # before a bump lands here
    cooldown:
      default-days: 7
    groups:
      gha:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "ci"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"
    # 7-day cooldown: a compromised upstream release (tj-actions pattern)
    # gets caught publicly before a bump lands here
    cooldown:
      default-days: 7
    groups:
      npm-all:
        patterns:
          - "*"
    open-pull-requests-limit: 1
    commit-message:
      prefix: "chore"
      include: "scope"
    labels:
      - "dependencies"
    ignore:
      # majors are hands-on migrations (a single grouped major pr is
      # unmergeable — see the 15-major #27). only minor + patch flow into the
      # monthly grouped pr; do majors by hand. security fixes still surface as
      # dependabot alerts + security-update prs even when a version-major is
      # ignored here.
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
