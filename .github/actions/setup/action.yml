name: Setup Node + pnpm
description: >
  Single source of truth for toolchain setup: pnpm version comes from the
  packageManager field in package.json, node from .nvmrc. Installs with a
  frozen lockfile. Set cache to "false" for release builds that must stay
  hermetic (no restored state of any kind).

inputs:
  cache:
    description: Use the pnpm store cache ("true"/"false")
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: ${{ inputs.cache == 'true' && 'pnpm' || '' }}

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
